<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="text-align: center; padding: 40px 0;">
        <h1 style="color: #333;">Welcome, {{.Nickname}}!</h1>
        <p style="color: #666; font-size: 16px;">感谢注册 Go Server Starter</p>
    </div>
    <div style="background: #f5f5f5; border-radius: 8px; padding: 20px; margin: 20px 0;">
        <p style="color: #333;">您的账号信息：</p>
        <table style="width: 100%; border-collapse: collapse;">
            <tr><td style="padding: 8px; color: #999;">用户ID</td><td style="padding: 8px;">{{.UserUniCode}}</td></tr>
            {{if .Email}}<tr><td style="padding: 8px; color: #999;">邮箱</td><td style="padding: 8px;">{{.Email}}</td></tr>{{end}}
            {{if .Mobile}}<tr><td style="padding: 8px; color: #999;">手机</td><td style="padding: 8px;">{{.Mobile}}</td></tr>{{end}}
        </table>
    </div>
    <p style="color: #999; font-size: 12px; text-align: center;">此邮件由系统自动发送，请勿回复。</p>
</body>
</html>
