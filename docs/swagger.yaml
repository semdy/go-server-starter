basePath: /api
definitions:
  go-server-starter_internal_dto.AuthLoginByEmailAndCodeReqDto:
    properties:
      code:
        type: string
      email:
        type: string
    required:
    - code
    - email
    type: object
  go-server-starter_internal_dto.AuthLoginByMobileAndCodeReqDto:
    properties:
      code:
        type: string
      countryCode:
        type: string
      mobile:
        type: string
    required:
    - code
    - countryCode
    - mobile
    type: object
  go-server-starter_internal_dto.AuthTokenResDto:
    properties:
      token:
        type: string
    type: object
  go-server-starter_internal_dto.CreateUserReqDto:
    properties:
      email:
        type: string
      nickname:
        maxLength: 20
        minLength: 2
        type: string
    required:
    - email
    - nickname
    type: object
  go-server-starter_internal_dto.DeadLetterItem:
    properties:
      attempt:
        type: integer
      error:
        type: string
      failedAt:
        type: string
      id:
        type: integer
      isRetried:
        type: boolean
      maxRetry:
        type: integer
      queue:
        type: string
      taskId:
        type: string
      taskType:
        type: string
    type: object
  go-server-starter_internal_dto.PaginationResDto-array_go-server-starter_internal_dto_DeadLetterItem:
    properties:
      data:
        items:
          $ref: '#/definitions/go-server-starter_internal_dto.DeadLetterItem'
        type: array
      hasNext:
        type: boolean
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
      totalPage:
        type: integer
    type: object
  go-server-starter_internal_dto.PaginationResDto-array_go-server-starter_internal_dto_TenantResDto:
    properties:
      data:
        items:
          $ref: '#/definitions/go-server-starter_internal_dto.TenantResDto'
        type: array
      hasNext:
        type: boolean
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
      totalPage:
        type: integer
    type: object
  go-server-starter_internal_dto.PaginationResDto-array_go-server-starter_internal_dto_UserListItemResDto:
    properties:
      data:
        items:
          $ref: '#/definitions/go-server-starter_internal_dto.UserListItemResDto'
        type: array
      hasNext:
        type: boolean
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
      totalPage:
        type: integer
    type: object
  go-server-starter_internal_dto.PaginationResDto-array_go-server-starter_internal_dto_UserRoleResDto:
    properties:
      data:
        items:
          $ref: '#/definitions/go-server-starter_internal_dto.UserRoleResDto'
        type: array
      hasNext:
        type: boolean
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
      totalPage:
        type: integer
    type: object
  go-server-starter_internal_dto.RetryDeadLetterReq:
    properties:
      id:
        type: integer
    required:
    - id
    type: object
  go-server-starter_internal_dto.SendEmailCodeReqDto:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  go-server-starter_internal_dto.SendSmsCodeReqDto:
    properties:
      countryCode:
        type: string
      mobile:
        type: string
    required:
    - countryCode
    - mobile
    type: object
  go-server-starter_internal_dto.SwitchTenantReqDto:
    properties:
      tenantId:
        type: integer
    required:
    - tenantId
    type: object
  go-server-starter_internal_dto.TenantCreateReqDto:
    properties:
      code:
        maxLength: 64
        minLength: 2
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - code
    - name
    type: object
  go-server-starter_internal_dto.TenantResDto:
    properties:
      active:
        type: boolean
      code:
        type: string
      createdAt:
        type: string
      id:
        type: integer
      name:
        type: string
      updatedAt:
        type: string
    type: object
  go-server-starter_internal_dto.TenantUpdateReqDto:
    properties:
      active:
        type: boolean
      name:
        maxLength: 100
        minLength: 2
        type: string
    type: object
  go-server-starter_internal_dto.UserInfoResDto:
    properties:
      active:
        type: boolean
      avatarURL:
        type: string
      countryCode:
        type: string
      desc:
        type: string
      email:
        type: string
      mobile:
        type: string
      nickname:
        type: string
      roles:
        items:
          type: string
        type: array
      uniCode:
        type: string
    type: object
  go-server-starter_internal_dto.UserListItemResDto:
    properties:
      active:
        type: boolean
      avatarURL:
        type: string
      countryCode:
        type: string
      createdAt:
        type: string
      desc:
        type: string
      email:
        type: string
      id:
        type: integer
      mobile:
        type: string
      nickname:
        type: string
      roles:
        items:
          type: string
        type: array
      uniCode:
        type: string
    type: object
  go-server-starter_internal_dto.UserRoleCreateReqDto:
    properties:
      code:
        maxLength: 50
        minLength: 1
        type: string
      enabled:
        type: boolean
    required:
    - code
    type: object
  go-server-starter_internal_dto.UserRoleResDto:
    properties:
      code:
        type: string
      createdAt:
        type: string
      enabled:
        type: boolean
      id:
        type: integer
      updatedAt:
        type: string
    type: object
  go-server-starter_internal_dto.UserRoleUpdateReqDto:
    properties:
      code:
        maxLength: 50
        minLength: 1
        type: string
      enabled:
        type: boolean
    type: object
  go-server-starter_internal_dto.UserUpdateInfoReqDto:
    properties:
      active:
        type: boolean
      avatarURL:
        type: string
      desc:
        maxLength: 200
        type: string
      nickname:
        maxLength: 20
        minLength: 2
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
  description: 生产就绪的 Go Web 服务脚手架，内置认证、RBAC 权限控制。
  license:
    name: MIT
    url: https://github.com/your-username/go-server-starter/blob/main/LICENSE
  termsOfService: http://swagger.io/terms/
  title: Go Server Starter API
  version: "1.0"
paths:
  /admin/dead-letters:
    delete:
      consumes:
      - application/json
      description: 物理删除指定死信记录。仅 super_admin 可访问。
      parameters:
      - description: 死信 ID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.RetryDeadLetterReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 删除死信记录
      tags:
      - admin
    get:
      consumes:
      - application/json
      description: 分页查询已落库的死信记录。仅 super_admin 可访问。
      parameters:
      - description: 任务类型
        in: query
        name: taskType
        type: string
      - description: 是否已重试
        in: query
        name: isRetried
        type: boolean
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页条数
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.PaginationResDto-array_go-server-starter_internal_dto_DeadLetterItem'
      security:
      - BearerAuth: []
      summary: 死信列表（DB）
      tags:
      - admin
  /admin/dead-letters/retry:
    post:
      consumes:
      - application/json
      description: 将指定死信任务重新入队，并标记为已重试。仅 super_admin 可访问。
      parameters:
      - description: 死信 ID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.RetryDeadLetterReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 重试单条死信
      tags:
      - admin
  /admin/dead-letters/retry-all:
    post:
      consumes:
      - application/json
      description: 将指定类型的所有未重试死信重新入队。仅 super_admin 可访问。
      parameters:
      - description: 任务类型
        in: query
        name: taskType
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: integer
            type: object
      security:
      - BearerAuth: []
      summary: 批量重试死信
      tags:
      - admin
  /admin/tenants:
    get:
      consumes:
      - application/json
      description: 分页查询租户列表，支持按 status 筛选。仅 super_admin 可访问。
      parameters:
      - description: '状态: active/disabled'
        in: query
        name: status
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页条数
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.PaginationResDto-array_go-server-starter_internal_dto_TenantResDto'
      security:
      - BearerAuth: []
      summary: 租户列表
      tags:
      - tenant
    post:
      consumes:
      - application/json
      description: 创建新租户。code 不可重复。仅 super_admin 可访问。
      parameters:
      - description: 租户信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.TenantCreateReqDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.TenantResDto'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 创建租户
      tags:
      - tenant
  /admin/tenants/{id}:
    delete:
      consumes:
      - application/json
      description: 软删除指定租户。仅 super_admin 可访问。
      parameters:
      - description: 租户 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 删除租户（软删除）
      tags:
      - tenant
    get:
      consumes:
      - application/json
      description: 根据 ID 查询租户详情。仅 super_admin 可访问。
      parameters:
      - description: 租户 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.TenantResDto'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 查询租户
      tags:
      - tenant
    put:
      consumes:
      - application/json
      description: 更新租户名称或状态。仅 super_admin 可访问。
      parameters:
      - description: 租户 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.TenantUpdateReqDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.TenantResDto'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 更新租户
      tags:
      - tenant
  /admin/tenants/code:
    get:
      consumes:
      - application/json
      description: 使用 Snowflake 生成全局唯一的租户 Code。仅 super_admin 可访问。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 生成租户 Code
      tags:
      - tenant
  /auth/login/email:
    post:
      consumes:
      - application/json
      description: 邮箱 + 验证码登录，未注册自动创建账号并绑定 user 角色。
      parameters:
      - description: 登录参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.AuthLoginByEmailAndCodeReqDto'
      - description: '设备类型: web/desktop/mobile/chromeExtension/api'
        in: header
        name: Device-Type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.AuthTokenResDto'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: 邮箱验证码登录
      tags:
      - auth
  /auth/login/mobile:
    post:
      consumes:
      - application/json
      description: 手机号 + 验证码登录，未注册自动创建账号并绑定 user 角色。
      parameters:
      - description: 登录参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.AuthLoginByMobileAndCodeReqDto'
      - description: '设备类型: web/desktop/mobile/chromeExtension/api'
        in: header
        name: Device-Type
        type: string
      - description: 租户 ID (默认 default)
        in: header
        name: X-Tenant-ID
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.AuthTokenResDto'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: 手机验证码登录
      tags:
      - auth
  /auth/send-email-code:
    post:
      consumes:
      - application/json
      description: 向指定邮箱发送登录验证码。60 秒内不可重复请求。
      parameters:
      - description: 邮箱
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.SendEmailCodeReqDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 发送邮箱验证码
      tags:
      - auth
  /auth/send-sms-code:
    post:
      consumes:
      - application/json
      description: 向指定手机号发送登录验证码。60 秒内不可重复请求。
      parameters:
      - description: 手机号
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.SendSmsCodeReqDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 发送短信验证码
      tags:
      - auth
  /auth/switch-tenant:
    post:
      consumes:
      - application/json
      description: 切换到指定租户，签发新的 JWT token（旧 token 仍有效）。需已是目标租户成员。
      parameters:
      - description: 租户 ID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.SwitchTenantReqDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.AuthTokenResDto'
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 切换租户
      tags:
      - auth
  /healthz:
    get:
      consumes:
      - application/json
      description: 返回服务及依赖（DB、Redis）的健康状态
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties: true
            type: object
      summary: 健康检查
      tags:
      - health
  /hello:
    get:
      consumes:
      - application/json
      description: 返回 Hello World，可选 name 参数返回多语言问候
      parameters:
      - description: 名称
        in: query
        name: name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 健康检查
      tags:
      - hello
  /role:
    post:
      consumes:
      - application/json
      description: 创建新的角色。需要 admin 或 super_admin 角色。
      parameters:
      - description: 角色信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.UserRoleCreateReqDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.UserRoleResDto'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 创建角色
      tags:
      - role
  /role/{id}:
    delete:
      consumes:
      - application/json
      description: 软删除指定角色。需要 admin 或 super_admin 角色。
      parameters:
      - description: 角色 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 删除角色（软删除）
      tags:
      - role
    get:
      consumes:
      - application/json
      description: 根据 ID 查询角色详情。需要 admin 或 super_admin 角色。
      parameters:
      - description: 角色 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.UserRoleResDto'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 查询角色
      tags:
      - role
    put:
      consumes:
      - application/json
      description: 更新角色代码或启用状态。需要 admin 或 super_admin 角色。
      parameters:
      - description: 角色 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.UserRoleUpdateReqDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.UserRoleResDto'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 更新角色
      tags:
      - role
  /role/table:
    get:
      consumes:
      - application/json
      description: 分页查询角色列表，支持按 code 和 enabled 筛选。需要 admin 或 super_admin 角色。
      parameters:
      - description: 角色代码
        in: query
        name: code
        type: string
      - description: 是否启用
        in: query
        name: enabled
        type: boolean
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页条数
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.PaginationResDto-array_go-server-starter_internal_dto_UserRoleResDto'
      security:
      - BearerAuth: []
      summary: 角色列表
      tags:
      - role
  /user/admin:
    post:
      consumes:
      - application/json
      description: 在管理员所属租户下创建用户。同一租户内 email 不可重复。需 admin+ 角色。
      parameters:
      - description: 用户信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.CreateUserReqDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.UserInfoResDto'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 创建用户（管理员）
      tags:
      - user
  /user/admin/{id}:
    delete:
      consumes:
      - application/json
      description: 软删除用户，自动校验与管理员属于同一租户。需 admin+ 角色。
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 删除用户（管理员）
      tags:
      - user
    get:
      consumes:
      - application/json
      description: 根据 ID 查询任意用户详情。需 admin+ 角色。
      parameters:
      - description: 用户 ID
