basePath: /api
definitions:
  go-server-starter_internal_dto.AuthLoginByEmailAndCodeReqDto:
    properties:
      code:
        type: string
      email:
        type: string
    required:
    - code
    - email
    type: object
  go-server-starter_internal_dto.AuthLoginByMobileAndCodeReqDto:
    properties:
      code:
        type: string
      countryCode:
        type: string
      mobile:
        type: string
    required:
    - code
    - countryCode
    - mobile
    type: object
  go-server-starter_internal_dto.AuthTenantResDto:
    properties:
      code:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  go-server-starter_internal_dto.AuthTokenResDto:
    properties:
      currentTenantId:
        type: integer
      permissions:
        items:
          type: string
        type: array
      roles:
        items:
          type: string
        type: array
      tenants:
        items:
          $ref: '#/definitions/go-server-starter_internal_dto.AuthTenantResDto'
        type: array
      token:
        type: string
    type: object
  go-server-starter_internal_dto.CreateUserReqDto:
    properties:
      email:
        type: string
      nickname:
        maxLength: 20
        minLength: 2
        type: string
    required:
    - email
    - nickname
    type: object
  go-server-starter_internal_dto.DeadLetterItem:
    properties:
      attempt:
        type: integer
      error:
        type: string
      failedAt:
        type: string
      id:
        type: integer
      isRetried:
        type: boolean
      maxRetry:
        type: integer
      queue:
        type: string
      taskId:
        type: string
      taskType:
        type: string
    type: object
  go-server-starter_internal_dto.MyAccessResDto:
    properties:
      permissions:
        items:
          type: string
        type: array
      roles:
        items:
          type: string
        type: array
    type: object
  go-server-starter_internal_dto.MyTenantsResDto:
    properties:
      currentTenantId:
        type: integer
      tenants:
        items:
          $ref: '#/definitions/go-server-starter_internal_dto.AuthTenantResDto'
        type: array
    type: object
  go-server-starter_internal_dto.PaginationResDto-array_go-server-starter_internal_dto_DeadLetterItem:
    properties:
      data:
        items:
          $ref: '#/definitions/go-server-starter_internal_dto.DeadLetterItem'
        type: array
      hasNext:
        type: boolean
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
      totalPage:
        type: integer
    type: object
  go-server-starter_internal_dto.PaginationResDto-array_go-server-starter_internal_dto_PermissionResDto:
    properties:
      data:
        items:
          $ref: '#/definitions/go-server-starter_internal_dto.PermissionResDto'
        type: array
      hasNext:
        type: boolean
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
      totalPage:
        type: integer
    type: object
  go-server-starter_internal_dto.PaginationResDto-array_go-server-starter_internal_dto_TenantResDto:
    properties:
      data:
        items:
          $ref: '#/definitions/go-server-starter_internal_dto.TenantResDto'
        type: array
      hasNext:
        type: boolean
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
      totalPage:
        type: integer
    type: object
  go-server-starter_internal_dto.PaginationResDto-array_go-server-starter_internal_dto_UserListItemResDto:
    properties:
      data:
        items:
          $ref: '#/definitions/go-server-starter_internal_dto.UserListItemResDto'
        type: array
      hasNext:
        type: boolean
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
      totalPage:
        type: integer
    type: object
  go-server-starter_internal_dto.PaginationResDto-array_go-server-starter_internal_dto_UserRoleResDto:
    properties:
      data:
        items:
          $ref: '#/definitions/go-server-starter_internal_dto.UserRoleResDto'
        type: array
      hasNext:
        type: boolean
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
      totalPage:
        type: integer
    type: object
  go-server-starter_internal_dto.PermissionResDto:
    properties:
      code:
        type: string
      description:
        type: string
      enabled:
        type: boolean
      id:
        type: integer
      name:
        type: string
    type: object
  go-server-starter_internal_dto.RetryDeadLetterReq:
    properties:
      id:
        type: integer
    required:
    - id
    type: object
  go-server-starter_internal_dto.SendEmailCodeReqDto:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  go-server-starter_internal_dto.SendSmsCodeReqDto:
    properties:
      countryCode:
        type: string
      mobile:
        type: string
    required:
    - countryCode
    - mobile
    type: object
  go-server-starter_internal_dto.SwitchTenantReqDto:
    properties:
      tenantId:
        type: integer
    required:
    - tenantId
    type: object
  go-server-starter_internal_dto.TenantCreateReqDto:
    properties:
      code:
        maxLength: 64
        minLength: 2
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - code
    - name
    type: object
  go-server-starter_internal_dto.TenantResDto:
    properties:
      active:
        type: boolean
      code:
        type: string
      createdAt:
        type: string
      id:
        type: integer
      name:
        type: string
      updatedAt:
        type: string
    type: object
  go-server-starter_internal_dto.TenantUpdateReqDto:
    properties:
      active:
        type: boolean
      name:
        maxLength: 100
        minLength: 2
        type: string
    type: object
  go-server-starter_internal_dto.UserInfoResDto:
    properties:
      active:
        type: boolean
      avatarURL:
        type: string
      countryCode:
        type: string
      desc:
        type: string
      email:
        type: string
      mobile:
        type: string
      nickname:
        type: string
      roles:
        items:
          type: string
        type: array
      uniCode:
        type: string
    type: object
  go-server-starter_internal_dto.UserListItemResDto:
    properties:
      active:
        type: boolean
      avatarURL:
        type: string
      countryCode:
        type: string
      createdAt:
        type: string
      desc:
        type: string
      email:
        type: string
      id:
        type: integer
      mobile:
        type: string
      nickname:
        type: string
      roles:
        items:
          type: string
        type: array
      uniCode:
        type: string
    type: object
  go-server-starter_internal_dto.UserRoleCreateReqDto:
    properties:
      code:
        maxLength: 50
        minLength: 2
        type: string
      description:
        maxLength: 255
        type: string
      enabled:
        type: boolean
      name:
        maxLength: 100
        minLength: 2
        type: string
      permissionIds:
        items:
          type: integer
        type: array
    required:
    - code
    - name
    type: object
  go-server-starter_internal_dto.UserRolePermissionConfigResDto:
    properties:
      builtIn:
        type: boolean
      editable:
        type: boolean
      permissions:
        items:
          $ref: '#/definitions/go-server-starter_internal_dto.UserRolePermissionItemResDto'
        type: array
      roleCode:
        type: string
      roleId:
        type: integer
      roleName:
        type: string
    type: object
  go-server-starter_internal_dto.UserRolePermissionItemResDto:
    properties:
      checked:
        type: boolean
      code:
        type: string
      description:
        type: string
      editable:
        type: boolean
      enabled:
        type: boolean
      id:
        type: integer
      name:
        type: string
    type: object
  go-server-starter_internal_dto.UserRoleResDto:
    properties:
      builtIn:
        type: boolean
      code:
        type: string
      createdAt:
        type: string
      description:
        type: string
      enabled:
        type: boolean
      id:
        type: integer
      name:
        type: string
      permissions:
        items:
          $ref: '#/definitions/go-server-starter_internal_dto.PermissionResDto'
        type: array
      tenantId:
        type: integer
      updatedAt:
        type: string
    type: object
  go-server-starter_internal_dto.UserRoleSetPermissionsReqDto:
    properties:
      permissionIds:
        items:
          type: integer
        type: array
    type: object
  go-server-starter_internal_dto.UserRoleTogglePermissionReqDto:
    properties:
      checked:
        type: boolean
    required:
    - checked
    type: object
  go-server-starter_internal_dto.UserRoleUpdateReqDto:
    properties:
      code:
        maxLength: 50
        minLength: 2
        type: string
      description:
        maxLength: 255
        type: string
      enabled:
        type: boolean
      name:
        maxLength: 100
        minLength: 2
        type: string
    type: object
  go-server-starter_internal_dto.UserSetRolesReqDto:
    properties:
      roleIds:
        items:
          type: integer
        type: array
    type: object
  go-server-starter_internal_dto.UserUpdateInfoReqDto:
    properties:
      active:
        type: boolean
      avatarURL:
        type: string
      desc:
        maxLength: 200
        type: string
      nickname:
        maxLength: 20
        minLength: 2
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
  description: 生产就绪的 Go Web 服务脚手架，内置认证、RBAC 权限控制。
  license:
    name: MIT
    url: https://github.com/your-username/go-server-starter/blob/main/LICENSE
  termsOfService: http://swagger.io/terms/
  title: Go Server Starter API
  version: "1.0"
paths:
  /admin/dead-letters:
    delete:
      consumes:
      - application/json
      description: 物理删除当前租户或系统级死信记录。仅 super_admin 可访问。
      parameters:
      - description: 死信 ID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.RetryDeadLetterReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 删除死信记录
      tags:
      - admin
    get:
      consumes:
      - application/json
      description: 分页查询当前租户及系统级（tenant_id 为 NULL）的死信记录。仅 super_admin 可访问。
      parameters:
      - description: 任务类型
        in: query
        name: taskType
        type: string
      - description: 是否已重试
        in: query
        name: isRetried
        type: boolean
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页条数
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.PaginationResDto-array_go-server-starter_internal_dto_DeadLetterItem'
      security:
      - BearerAuth: []
      summary: 死信列表（DB）
      tags:
      - admin
  /admin/dead-letters/retry:
    post:
      consumes:
      - application/json
      description: 将当前租户或系统级死信任务重新入队，并标记为已重试。仅 super_admin 可访问。
      parameters:
      - description: 死信 ID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.RetryDeadLetterReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 重试单条死信
      tags:
      - admin
  /admin/dead-letters/retry-all:
    post:
      consumes:
      - application/json
      description: 将指定类型下当前租户及系统级的所有未重试死信重新入队。仅 super_admin 可访问。
      parameters:
      - description: 任务类型
        in: query
        name: taskType
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: integer
            type: object
      security:
      - BearerAuth: []
      summary: 批量重试死信
      tags:
      - admin
  /admin/tenants:
    get:
      consumes:
      - application/json
      description: 分页查询租户列表，支持按 status 筛选。仅 super_admin 可访问。
      parameters:
      - description: '状态: active/disabled'
        in: query
        name: status
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页条数
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.PaginationResDto-array_go-server-starter_internal_dto_TenantResDto'
      security:
      - BearerAuth: []
      summary: 租户列表
      tags:
      - tenant
    post:
      consumes:
      - application/json
      description: 创建新租户。code 不可重复。仅 super_admin 可访问。
      parameters:
      - description: 租户信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.TenantCreateReqDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.TenantResDto'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 创建租户
      tags:
      - tenant
  /admin/tenants/{id}:
    delete:
      consumes:
      - application/json
      description: 软删除指定租户。仅 super_admin 可访问。
      parameters:
      - description: 租户 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 删除租户（软删除）
      tags:
      - tenant
    get:
      consumes:
      - application/json
      description: 根据 ID 查询租户详情。仅 super_admin 可访问。
      parameters:
      - description: 租户 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.TenantResDto'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 查询租户
      tags:
      - tenant
    put:
      consumes:
      - application/json
      description: 更新租户名称或状态。仅 super_admin 可访问。
      parameters:
      - description: 租户 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.TenantUpdateReqDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.TenantResDto'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 更新租户
      tags:
      - tenant
  /admin/tenants/code:
    get:
      consumes:
      - application/json
      description: 使用 Snowflake 生成全局唯一的租户 Code。仅 super_admin 可访问。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 生成租户 Code
      tags:
      - tenant
  /auth/login/email:
    post:
      consumes:
      - application/json
      description: 邮箱 + 验证码登录，未注册自动创建账号并绑定 user 角色。
      parameters:
      - description: 登录参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.AuthLoginByEmailAndCodeReqDto'
      - description: '设备类型: web/desktop/mobile/chromeExtension/api'
        in: header
        name: Device-Type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.AuthTokenResDto'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: 邮箱验证码登录
      tags:
      - auth
  /auth/login/mobile:
    post:
      consumes:
      - application/json
      description: 手机号 + 验证码登录，未注册自动创建账号并绑定 user 角色。
      parameters:
      - description: 登录参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.AuthLoginByMobileAndCodeReqDto'
      - description: '设备类型: web/desktop/mobile/chromeExtension/api'
        in: header
        name: Device-Type
        type: string
      - description: 租户 ID (默认 default)
        in: header
        name: X-Tenant-ID
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.AuthTokenResDto'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: 手机验证码登录
      tags:
      - auth
  /auth/my-access:
    get:
      description: 返回当前租户下的角色代码和权限代码，供前端控制入口显示。
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.MyAccessResDto'
      security:
      - BearerAuth: []
      summary: 当前用户访问能力
      tags:
      - auth
  /auth/my-tenants:
    get:
      description: 返回当前租户 ID，以及当前用户已加入且启用的全部租户。
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.MyTenantsResDto'
      security:
      - BearerAuth: []
      summary: 当前用户可用租户
      tags:
      - auth
  /auth/send-email-code:
    post:
      consumes:
      - application/json
      description: 向指定邮箱发送登录验证码。60 秒内不可重复请求。
      parameters:
      - description: 邮箱
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.SendEmailCodeReqDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 发送邮箱验证码
      tags:
      - auth
  /auth/send-sms-code:
    post:
      consumes:
      - application/json
      description: 向指定手机号发送登录验证码。60 秒内不可重复请求。
      parameters:
      - description: 手机号
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.SendSmsCodeReqDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 发送短信验证码
      tags:
      - auth
  /auth/switch-tenant:
    post:
      consumes:
      - application/json
      description: 切换到指定租户，签发新的 JWT token（旧 token 仍有效）。用户必须属于目标租户（默认租户或 user_tenant_refs
        成员关系）。
      parameters:
      - description: 租户 ID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-server-starter_internal_dto.SwitchTenantReqDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.AuthTokenResDto'
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 切换租户
      tags:
      - auth
  /healthz:
    get:
      consumes:
      - application/json
      description: 返回服务及依赖（DB、Redis）的健康状态
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties: true
            type: object
      summary: 健康检查
      tags:
      - health
  /hello:
    get:
      consumes:
      - application/json
      description: 返回 Hello World，可选 name 参数返回多语言问候
      parameters:
      - description: 名称
        in: query
        name: name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 健康检查
      tags:
      - hello
  /permission/table:
    get:
      description: 分页查询可分配的权限代码。
      parameters:
      - description: 权限代码
        in: query
        name: code
        type: string
      - description: 是否启用
        in: query
        name: enabled
        type: boolean
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页条数
        in: query
        name: pageSize
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-server-starter_internal_dto.PaginationResDto-array_go-server-starter_internal_dto_PermissionResDto'
      security:
      - BearerAuth: []
